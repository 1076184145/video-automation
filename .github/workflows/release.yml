name: Build desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build, for example v0.2.4"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  windows-lite:
    name: Windows Lite package
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Resolve release version
        shell: pwsh
        run: |
          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Invalid release tag: $env:RELEASE_TAG"
          }
          $version = $env:RELEASE_TAG -replace '^v', ''
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Release version: $version"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtual environment
        shell: pwsh
        run: |
          python -m venv venv
          .\venv\Scripts\python.exe -m pip install --upgrade pip

      - name: Build Lite desktop bundle
        shell: pwsh
        run: .\tools\build_desktop.ps1 -InstallDeps -Lite -Clean

      - name: Package Lite zip
        shell: pwsh
        run: .\tools\package_desktop.ps1 -Lite -SkipBuild -Version $env:RELEASE_VERSION

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: .\tools\build_installer.ps1 -Version $env:RELEASE_VERSION

      - name: Show release assets
        shell: pwsh
        run: |
          Get-ChildItem dist\releases,dist\installers -File | Select-Object FullName,Length | Format-Table -AutoSize

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Video Automation ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/releases/VideoAutomationLite-${{ env.RELEASE_VERSION }}.zip
            dist/installers/VideoAutomationLite-Setup-${{ env.RELEASE_VERSION }}.exe
